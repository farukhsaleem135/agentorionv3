  <body>
    <div id="root">
      <!-- Inline skeleton — painted before JS loads, replaced by React on mount -->
      <div id="skeleton-shell" style="
        background: hsl(220 26% 9%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      ">
        <style>
          @keyframes skeleton-shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
          }
          .sk {
            background: linear-gradient(90deg,
              hsl(220 26% 16%) 25%,
              hsl(220 26% 22%) 50%,
              hsl(220 26% 16%) 75%
            );
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite;
            border-radius: 8px;
          }
        </style>

        <!-- Hero skeleton -->
        <div style="position:relative;height:60vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 24px;">
          <div class="sk" style="width:70%;max-width:400px;height:28px;margin-bottom:12px;"></div>
          <div class="sk" style="width:50%;max-width:280px;height:18px;margin-bottom:24px;"></div>
          <div class="sk" style="width:180px;height:48px;border-radius:999px;"></div>
        </div>

        <!-- Content skeleton -->
        <div style="padding:0 24px;max-width:600px;margin:0 auto;width:100%;">
          <div class="sk" style="width:100%;height:14px;margin-bottom:10px;"></div>
          <div class="sk" style="width:85%;height:14px;margin-bottom:10px;"></div>
          <div class="sk" style="width:92%;height:14px;margin-bottom:10px;"></div>
        </div>
      </div>
    </div>
    <script>
      window.__SKELETON_CLEANUP__ = function() {
        var s = document.getElementById('skeleton-shell');
        if (s) s.remove();
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
